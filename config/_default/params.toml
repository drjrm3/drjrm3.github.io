# Congo theme parameters
# Docs: https://jpanther.github.io/congo/docs/configuration/

colorScheme = "congo"
defaultAppearance = "light"
autoSwitchAppearance = true

enableSearch = true
enableCodeCopy = true

[article]
  showDate = true
  showAuthor = true
  showReadingTime = true
  showTableOfContents = true
  showTaxonomies = true
  showWordCount = false
  showEdit = false
  showSummary = true

  [article.math]
    katex = true

[header]
  layout = "basic"

[footer]
  showCopyright = true
  showThemeAttribution = false
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "profile"
  showRecent = true
  recentLimit = 5

[taxonomy]
  showTermCount = true

[author]
  name = "Robert"
  headline = "Food · Math · Tech"
